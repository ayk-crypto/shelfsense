services:
  - type: web
    name: shelfsense-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build:api
    startCommand: npm run start --workspace @shelfsense/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        sync: false
      - key: EMAIL_FROM
        sync: false
